# ============================================
# Grafana Dashboard Provisioning
# ============================================

apiVersion: 1

providers:
  - name: 'Price Hunter Dashboards'
    orgId: 1
    folder: 'Price Hunter'
    folderUid: 'price-hunter'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
